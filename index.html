<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Arquivo_02</title>

<style>
body {
    background-color: black;
    color: #00ff9f;
    font-family: monospace;
    text-align: center;
    padding: 50px;
}

img {
    max-width: 80%;
    border: 1px solid #00ff9f;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
}

button {
    padding: 10px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    cursor: pointer;
}

button:hover {
    background-color: #003322;
}

.hidden {
    display: none;
}

</style>

</head>
<body>

<h1>ARQUIVO ENCONTRADO</h1>

<p>Isso foi tudo que restou.</p>

<!-- TROQUE A IMAGEM AQUI -->
<img src="imagem.jpg" alt="arquivo">

<br><br>

<input type="password" id="senha" placeholder="Digite a senha">
<button onclick="verificarSenha()">ACESSAR</button>

<p id="erro" class="hidden">Senha incorreta.</p>

<div id="conteudoSecreto" class="hidden">
    <h2>Acesso liberado</h2>
    <p>Você está mais perto do que deveria.</p>
    <a href="proxima-pista.html">Continuar</a>
</div>

<!-- dica escondida -->
<!-- talvez a resposta esteja invertida -->

<script>
function verificarSenha() {
    var senha = document.getElementById("senha").value;

    if(senha === "orfeu") {
        document.getElementById("conteudoSecreto").style.display = "block";
        document.getElementById("erro").style.display = "none";
    } else {
        document.getElementById("erro").style.display = "block";
    }
}
</script>

</body>
</html>
