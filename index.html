<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Arquivo_01</title>

<style>
body {
    background-color: black;
    color: #00ff9f;
    font-family: monospace;
    text-align: center;
    padding: 50px;
}

h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
}

a {
    color: #00ff9f;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.hidden {
    display: none;
}

.box {
    border: 1px solid #00ff9f;
    padding: 20px;
    margin-top: 30px;
}
</style>

</head>
<body>

<h1>ARQUIVO RESTRITO</h1>

<p>Se você está vendo isso... algo deu errado.</p>

<div class="box">
    <p>Data: 17/09/2008</p>
    <p>Status: INCOMPLETO</p>
</div>

<br>

<a href="#" onclick="mostrarMensagem()">[ ACESSAR LOG ]</a>

<div id="mensagem" class="hidden">
    <p>...</p>
    <p>Eles não deveriam lembrar.</p>
    <p>Mas você encontrou.</p>
</div>

<!-- PISTA ESCONDIDA NO CÓDIGO -->
<!-- senha: orfeu_17 -->

<script>
function mostrarMensagem() {
    document.getElementById("mensagem").style.display = "block";
}
</script>

</body>
</html>
